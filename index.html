<!DOCTYPE html>
<html>
<head>
    <title>SOBRE VC.</title>
</head>
<body>
    <h1>vc morde fronha?</h1>
    <input type="text" id="respostaInput" placeholder="Digite sim ou não">
    <button onclick="verificar()">Enviar</button>
    <p id="resultado"></p>

    <script>
        function verificar() {
            const resposta = document.getElementById("respostaInput").value.toLowerCase();
            const resultado = document.getElementById("resultado");

            if (resposta === "sim") {
                resultado.innerText = "Parabéns agora vc e um mordedor de fronha profissional!!";
            } else if (resposta === "nao" || resposta === "não") {
                resultado.innerText = "vc n e mordedor de fronha!!!";
            } else {
                resultado.innerText = "Por favor, digite 'sim' ou 'não'.";
            }
        }
    </script>
</body>
</html>
